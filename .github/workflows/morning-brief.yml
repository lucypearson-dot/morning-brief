name: Morning Brief
on:
  schedule:
    # GitHub Actions cron is UTC-only, and the UK clocks change between GMT and
    # BST, so we fire at both 6am and 7am UTC; brief.py checks the real London
    # time and only sends on the run that's actually 7am local.
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  send-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 openai
      - name: Send morning brief
        run: python brief.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
